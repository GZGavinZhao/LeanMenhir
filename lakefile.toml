name = "LeanMenhir"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["LeanMenhir"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.31.0"

[[require]]
name = "repl"
scope = "leanprover-community"
rev = "v4.31.0"

[[lean_lib]]
name = "LeanMenhir"
